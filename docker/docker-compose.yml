services:
  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: dev-agent-local:latest
    container_name: dev-agent
    environment: &env
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      MYSQL_HOST: ${MYSQL_HOST:-host.docker.internal}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
      MYSQL_DB: ${MYSQL_DB:-dev_agent}
    volumes:
      - agent-workspace:/tmp/agent-workspace
      - agent-audit:/tmp/agent-audit
    extra_hosts:
      - "host.docker.internal:host-gateway"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stdin_open: true
    tty: true

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: dev-agent-local:latest
    container_name: dev-agent-api
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment: *env
    volumes:
      - agent-workspace:/tmp/agent-workspace
      - agent-audit:/tmp/agent-audit
    extra_hosts:
      - "host.docker.internal:host-gateway"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  agent-workspace:
  agent-audit:
